<div class="page-header">

    <h2>

        Data Karyawan

    </h2>

</div>

<div class="dashboard-card">

    <h3>

        Data Alternatif

    </h3>

    <p>

        Pada sistem ini, alternatif
        merupakan seluruh karyawan
        yang akan dinilai menggunakan
        metode MOORA.

    </p>

</div>

<div class="form-card">

    <div class="form-grid">

        <div class="form-group">

            <label>

                ID Karyawan

            </label>

            <input
                type="number"
                id="karyawanId">

        </div>

        <div class="form-group">

            <label>

                Nama Karyawan

            </label>

            <input
                type="text"
                id="karyawanNama">

        </div>

        <div class="form-group">

            <label>

                Jabatan

            </label>

            <input
                type="text"
                id="karyawanJabatan">

        </div>

    </div>

    <br>

    <div class="btn-group">

        <button
            class="action-btn"
            onclick="simpanKaryawan()">

            Simpan

        </button>

        <button
            class="btn-edit"
            onclick="resetFormKaryawan()">

            Reset

        </button>

    </div>

</div>

<div class="table-card">

    <table class="main-table">

        <thead>

            <tr>

                <th>
                    ID Karyawan
                </th>

                <th>
                    Nama Karyawan
                </th>

                <th>
                    Jabatan
                </th>

                <th>
                    Aksi
                </th>

            </tr>

        </thead>

        <tbody
            id="karyawanTable">

        </tbody>

    </table>

</div>
